<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://korea-quiz-client.vercel.app" />
    <link rel="dns-prefetch" href="//korea-quiz-client.vercel.app" />
    <title>내 두뇌 몇 등?</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif; }
      body { background: #f8fafc; color: #0b1220; }
      #root { width: 100%; height: 100%; position: relative; }
      iframe {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        border: none;
      }
      .loader {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(to bottom, rgba(238,244,255,.92), rgba(255,255,255,.92));
        transition: opacity .18s ease;
      }
      .loader-card {
        text-align: center;
        padding: 16px 20px;
        border-radius: 14px;
        border: 1px solid #e6eaf2;
        background: #fff;
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid #dbeafe;
        border-top-color: #1b64f2;
        border-radius: 50%;
        margin: 0 auto 10px;
        animation: spin 1s linear infinite;
      }
      .title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .desc {
        color: #5b6475;
        font-size: 12px;
      }
      .error {
        display: none;
        margin-top: 10px;
      }
      .error.show {
        display: block;
      }
      .retry {
        margin-top: 10px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        background: #1b64f2;
        color: #fff;
        font-weight: 700;
        font-size: 13px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loader" class="loader">
        <div class="loader-card">
          <div class="spinner"></div>
          <div class="title">내 두뇌 몇 등?</div>
          <div class="desc">게임을 불러오는 중이에요...</div>
          <div id="error" class="error">
            <div class="desc">네트워크 상태를 확인해 주세요.</div>
            <button id="retry" class="retry">다시 시도</button>
          </div>
        </div>
      </div>
      <iframe id="appFrame" src="https://korea-quiz-client.vercel.app/" title="내 두뇌 몇 등?"></iframe>
    </div>
    <script>
      const frame = document.getElementById('appFrame');
      const loader = document.getElementById('loader');
      const error = document.getElementById('error');
      const retry = document.getElementById('retry');
      const SRC = 'https://korea-quiz-client.vercel.app/';
      let loaded = false;
      let forceShown = false;

      function hideLoader() {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 180);
      }

      const timeoutId = setTimeout(() => {
        if (!loaded) error.classList.add('show');
      }, 3500);

      // 체감 속도 개선: 로드가 늦어도 로더를 오래 붙잡지 않음
      const forceShowTimer = setTimeout(() => {
        forceShown = true;
        hideLoader();
      }, 1400);

      frame.addEventListener('load', () => {
        loaded = true;
        clearTimeout(timeoutId);
        clearTimeout(forceShowTimer);
        if (!forceShown) hideLoader();
      });

      retry.addEventListener('click', () => {
        loaded = false;
        forceShown = false;
        error.classList.remove('show');
        loader.style.opacity = '1';
        loader.style.display = 'grid';
        frame.src = SRC + '?t=' + Date.now();
      });
    </script>
  </body>
</html>
